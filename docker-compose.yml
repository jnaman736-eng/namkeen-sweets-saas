version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: namkeen-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin123}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./backend/scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - namkeen-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: namkeen-backend
    environment:
      NODE_ENV: development
      MONGO_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-admin123}@mongodb:27017/namkeen-sweets?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      PORT: 5000
      ALLOWED_ORIGINS: http://localhost:8081,http://localhost:19000
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - namkeen-network
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: namkeen-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - namkeen-network
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:

networks:
  namkeen-network:
    driver: bridge
